<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마케팅 아이디어 보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

  header { background: #fff; border-bottom: 1px solid #e8e8e5; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 15px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; background: #534AB7; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .add-btn { display: flex; align-items: center; gap: 6px; background: #534AB7; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .add-btn:hover { background: #3C3489; }

  .filter-bar { background: #fff; border-bottom: 1px solid #e8e8e5; padding: 0 24px; display: flex; align-items: center; gap: 6px; height: 48px; overflow-x: auto; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 5px 13px; border-radius: 99px; border: 1px solid #e0e0dc; background: transparent; font-size: 12px; color: #666; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-btn:hover { border-color: #b0b0aa; color: #333; }
  .filter-btn.active { background: #534AB7; color: #fff; border-color: #534AB7; }
  .filter-count { padding: 0 4px; font-size: 11px; }
  .filter-btn:not(.active) .filter-count { color: #aaa; }
  .divider { width: 1px; height: 16px; background: #e8e8e5; flex-shrink: 0; margin: 0 2px; }

  main { padding: 20px 24px; max-width: 1140px; margin: 0 auto; }
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8e8e5; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-num { font-size: 22px; font-weight: 600; color: #1a1a1a; }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .sort-select { border: 1px solid #e0e0dc; border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #555; background: #fff; cursor: pointer; outline: none; }

  .table-wrap { background: #fff; border-radius: 12px; border: 1px solid #e8e8e5; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: #999; padding: 10px 14px; border-bottom: 1px solid #e8e8e5; white-space: nowrap; background: #fafaf8; }
  td { padding: 0; border-bottom: 1px solid #f0f0ec; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover .td-i { background: #fafaf8; }
  tr.exp .td-i { background: #fafaf8; }
  .td-i { padding: 11px 14px; }

  .title-row { display: flex; align-items: flex-start; gap: 6px; cursor: pointer; }
  .chevron { font-size: 10px; color: #ccc; transition: transform 0.15s; flex-shrink: 0; margin-top: 3px; }
  .chevron.open { transform: rotate(180deg); }
  .title-text { font-size: 13px; color: #1a1a1a; line-height: 1.4; flex: 1; }
  .cat-tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; margin-top: 4px; }
  .cat-SNS      { background: #E6F1FB; color: #0C447C; }
  .cat-이벤트   { background: #FAEEDA; color: #633806; }
  .cat-오프라인 { background: #EAF3DE; color: #27500A; }
  .cat-팩스메일 { background: #EEEDFE; color: #3C3489; }

  /* 펼침 패널 */
  .expand-panel { display: none; border-top: 1px solid #f0f0ec; background: #fafaf8; }
  .expand-panel.open { display: block; }
  .panel-inner { padding: 12px 14px 14px 36px; display: flex; flex-direction: column; gap: 14px; }

  /* 메모 */
  .memo-section .section-label { font-size: 11px; color: #aaa; margin-bottom: 5px; }
  .memo-section textarea { width: 100%; border: 1px solid #e0e0dc; border-radius: 8px; padding: 8px 10px; font-size: 12px; line-height: 1.6; background: #fff; color: #1a1a1a; resize: vertical; min-height: 60px; font-family: inherit; outline: none; }
  .memo-section textarea:focus { border-color: #534AB7; }

  /* 댓글 */
  .comment-section .section-label { font-size: 11px; color: #aaa; margin-bottom: 8px; }
  .comment-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .comment-item { display: flex; gap: 8px; align-items: flex-start; }
  .comment-av { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
  .comment-body { flex: 1; background: #fff; border: 1px solid #e8e8e5; border-radius: 8px; padding: 7px 10px; }
  .comment-author { font-size: 11px; font-weight: 600; color: #555; margin-bottom: 2px; }
  .comment-text { font-size: 12px; color: #333; line-height: 1.5; }
  .comment-time { font-size: 10px; color: #bbb; margin-top: 2px; }
  .comment-input-row { display: flex; gap: 8px; align-items: center; }
  .comment-author-input { width: 90px; border: 1px solid #e0e0dc; border-radius: 8px; padding: 7px 10px; font-size: 12px; color: #1a1a1a; background: #fff; font-family: inherit; outline: none; flex-shrink: 0; }
  .comment-author-input:focus { border-color: #534AB7; }
  .comment-text-input { flex: 1; border: 1px solid #e0e0dc; border-radius: 8px; padding: 7px 10px; font-size: 12px; color: #1a1a1a; background: #fff; font-family: inherit; outline: none; }
  .comment-text-input:focus { border-color: #534AB7; }
  .comment-submit { background: #534AB7; color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .comment-submit:hover { background: #3C3489; }
  .no-comment { font-size: 12px; color: #ccc; }

  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; cursor: pointer; white-space: nowrap; user-select: none; }
  .b0 { background: #FAEEDA; color: #633806; }
  .b1 { background: #E6F1FB; color: #0C447C; }
  .b2 { background: #EAF3DE; color: #27500A; }
  .b3 { background: #F1EFE8; color: #5F5E5A; }

  .av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .author-wrap { display: flex; align-items: center; gap: 7px; }
  .author-name { font-size: 13px; color: #1a1a1a; white-space: nowrap; }

  .like-btn { display: flex; align-items: center; gap: 4px; border: none; background: none; cursor: pointer; color: #ccc; font-size: 13px; padding: 3px 8px; border-radius: 8px; transition: all 0.15s; }
  .like-btn:hover { background: #fff0f5; color: #D4537E; }
  .like-btn.liked { color: #D4537E; }

  .date-txt { font-size: 12px; color: #aaa; white-space: nowrap; }
  .date-input { border: none; background: transparent; font-size: 12px; color: #888; cursor: pointer; outline: none; width: 96px; }
  .date-input:hover { color: #534AB7; }
  .date-input.overdue { color: #E24B4A; font-weight: 500; }
  .date-input.soon { color: #BA7517; font-weight: 500; }

  .row-actions { display: flex; align-items: center; gap: 2px; }
  .icon-btn { border: none; background: none; cursor: pointer; color: #ddd; padding: 4px 5px; border-radius: 6px; font-size: 14px; line-height: 1; }
  .icon-btn:hover { background: #f5f5f5; color: #555; }
  .icon-btn.del:hover { color: #E24B4A; background: #fff0f0; }

  .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 10px; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 500; }
  .field input, .field textarea, .field select { width: 100%; border: 1px solid #e0e0dc; border-radius: 8px; padding: 9px 12px; font-size: 13px; color: #1a1a1a; background: #fff; font-family: inherit; outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: #534AB7; }
  .field textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { border: 1px solid #e0e0dc; background: transparent; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; color: #666; }
  .btn-ok { background: #534AB7; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-weight: 500; }
  .btn-ok:hover { background: #3C3489; }
  .btn-ok:disabled { background: #b0aee0; cursor: not-allowed; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .loading { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }

  @media (max-width: 640px) {
    main { padding: 14px; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0 14px; }
    .filter-bar { padding: 0 14px; }
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6L15 17H9l-.7-2C6.3 13.7 5 11.5 5 9a7 7 0 0 1 7-7z"/></svg>
    </div>
    마케팅 아이디어 보드
  </div>
  <button class="add-btn" onclick="openModal()">＋ 아이디어 추가</button>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('전체',this)">전체 <span class="filter-count" id="cnt-전체">0</span></button>
  <span class="divider"></span>
  <button class="filter-btn" onclick="setFilter('검토중',this)">검토중 <span class="filter-count" id="cnt-검토중">0</span></button>
  <button class="filter-btn" onclick="setFilter('진행중',this)">진행중 <span class="filter-count" id="cnt-진행중">0</span></button>
  <button class="filter-btn" onclick="setFilter('완료',this)">완료 <span class="filter-count" id="cnt-완료">0</span></button>
  <button class="filter-btn" onclick="setFilter('보류',this)">보류 <span class="filter-count" id="cnt-보류">0</span></button>
  <span class="divider"></span>
  <button class="filter-btn" onclick="setFilter('SNS',this)">SNS <span class="filter-count" id="cnt-SNS">0</span></button>
  <button class="filter-btn" onclick="setFilter('이벤트',this)">이벤트 <span class="filter-count" id="cnt-이벤트">0</span></button>
  <button class="filter-btn" onclick="setFilter('오프라인',this)">오프라인 <span class="filter-count" id="cnt-오프라인">0</span></button>
  <button class="filter-btn" onclick="setFilter('팩스/메일',this)">팩스/메일 <span class="filter-count" id="cnt-팩스메일">0</span></button>
</div>

<main>
  <div class="summary">
    <div class="stat-card"><div class="stat-label">전체 아이디어</div><div class="stat-num" id="s-total">0</div></div>
    <div class="stat-card"><div class="stat-label">진행중</div><div class="stat-num" id="s-active">0</div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-num" id="s-done">0</div></div>
    <div class="stat-card"><div class="stat-label">총 추천수</div><div class="stat-num" id="s-likes">0</div></div>
  </div>

  <div class="toolbar">
    <select class="sort-select" id="sort-select" onchange="applySort()">
      <option value="latest">최신순</option>
      <option value="likes">추천 많은 순</option>
      <option value="plan">실행 예정일 순</option>
    </select>
    <span id="result-label" style="font-size:12px;color:#aaa"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:30%">아이디어</th>
          <th style="width:12%">담당자</th>
          <th style="width:12%">진행 상태</th>
          <th style="width:9%;text-align:center">추천</th>
          <th style="width:10%">등록일</th>
          <th style="width:13%">실행 예정일</th>
          <th style="width:7%"></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7"><div class="loading">불러오는 중...</div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- 추가 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">새 아이디어</div>
    <div class="field"><label>아이디어 제목 *</label><input id="f-title" placeholder="한 줄로 요약해주세요"></div>
    <div class="field"><label>세부 내용 (선택)</label><textarea id="f-memo" placeholder="배경, 기대효과, 실행 방법 등 자유롭게"></textarea></div>
    <div class="field-row">
      <div class="field"><label>담당자</label><input id="f-author" placeholder="이름"></div>
      <div class="field"><label>카테고리</label>
        <select id="f-cat">
          <option value="SNS">SNS</option>
          <option value="이벤트">이벤트</option>
          <option value="오프라인">오프라인</option>
          <option value="팩스/메일">팩스/메일</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>진행 상태</label>
        <select id="f-status">
          <option value="검토중">검토중</option>
          <option value="진행중">진행중</option>
          <option value="완료">완료</option>
          <option value="보류">보류</option>
        </select>
      </div>
      <div class="field"><label>실행 예정일</label><input type="date" id="f-plan"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-ok" id="submit-btn" onclick="submitIdea()">등록</button>
    </div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <div class="modal-title">아이디어 수정</div>
    <div class="field"><label>아이디어 제목 *</label><input id="e-title" placeholder="한 줄로 요약해주세요"></div>
    <div class="field"><label>세부 내용</label><textarea id="e-memo"></textarea></div>
    <div class="field-row">
      <div class="field"><label>담당자</label><input id="e-author" placeholder="이름"></div>
      <div class="field"><label>카테고리</label>
        <select id="e-cat">
          <option value="SNS">SNS</option>
          <option value="이벤트">이벤트</option>
          <option value="오프라인">오프라인</option>
          <option value="팩스/메일">팩스/메일</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>진행 상태</label>
        <select id="e-status">
          <option value="검토중">검토중</option>
          <option value="진행중">진행중</option>
          <option value="완료">완료</option>
          <option value="보류">보류</option>
        </select>
      </div>
      <div class="field"><label>실행 예정일</label><input type="date" id="e-plan"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-ok" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwW5ty-o60jmzWAtfBQ4u9f8GEbaqj6W2wmBfQmgyplSuCPVE2t60gUQbg39Uslifipsg/exec';

const STATUS_LIST = ['검토중','진행중','완료','보류'];
const BADGE_CLS   = ['b0','b1','b2','b3'];
const AV_COLORS   = [
  ['#EEEDFE','#3C3489'],['#E1F5EE','#085041'],
  ['#E6F1FB','#0C447C'],['#FAEEDA','#633806'],['#FBEAF0','#72243E']
];

let ideas = [];
let comments = {};  // { ideaId: [{author, text, time}] }
let expanded = {};
let currentFilter = '전체';
let currentSort = 'latest';
let editingId = null;

function avStyle(name) {
  const i = (name||'익').charCodeAt(0) % AV_COLORS.length;
  return `background:${AV_COLORS[i][0]};color:${AV_COLORS[i][1]}`;
}
function fmtDate(s) {
  if (!s) return '—';
  const p = s.split('-');
  return p.length === 3 ? `${p[1]}.${p[2]}` : s;
}
function fmtTime(s) {
  if (!s) return '';
  return s.slice(0,16).replace('T',' ');
}
function planClass(s) {
  if (!s) return '';
  const diff = (new Date(s) - new Date()) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff <= 3) return 'soon';
  return '';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function catCls(cat) {
  return 'cat-' + (cat||'').replace('/','');
}

/* ── 로드 ── */
async function loadIdeas() {
  try {
    const res = await fetch(API_URL + '?action=list');
    const data = await res.json();
    ideas = data.map(d => ({ ...d, myLike: false }));
    const saved = localStorage.getItem('idea_author');
    if (saved) { document.getElementById('f-author').value = saved; }
    renderAll();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="7"><div class="empty"><div class="empty-icon">⚠️</div>데이터를 불러올 수 없어요. API URL을 확인해주세요.</div></td></tr>';
  }
}

async function loadComments(ideaId) {
  try {
    const res = await fetch(`${API_URL}?action=comments&ideaId=${ideaId}`);
    const data = await res.json();
    comments[ideaId] = data;
    renderComments(ideaId);
  } catch(e) {}
}

/* ── 필터 & 정렬 ── */
function getFiltered() {
  let list = [...ideas];
  if (currentFilter === '전체') {}
  else if (['검토중','진행중','완료','보류'].includes(currentFilter)) {
    list = list.filter(d => d.status === currentFilter);
  } else {
    list = list.filter(d => d.category === currentFilter);
  }
  if (currentSort === 'likes') list.sort((a,b) => (parseInt(b.likes)||0) - (parseInt(a.likes)||0));
  else if (currentSort === 'plan') list.sort((a,b) => {
    if (!a.plan) return 1; if (!b.plan) return -1;
    return a.plan.localeCompare(b.plan);
  });
  return list;
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function applySort() {
  currentSort = document.getElementById('sort-select').value;
  renderTable();
}

/* ── 렌더 ── */
function renderAll() { updateCounts(); updateStats(); renderTable(); }

function updateCounts() {
  document.getElementById('cnt-전체').textContent = ideas.length;
  ['검토중','진행중','완료','보류'].forEach(s => {
    const el = document.getElementById('cnt-' + s);
    if (el) el.textContent = ideas.filter(d => d.status === s).length;
  });
  const catMap = {'SNS':'SNS','이벤트':'이벤트','오프라인':'오프라인','팩스/메일':'팩스메일'};
  Object.entries(catMap).forEach(([cat, key]) => {
    const el = document.getElementById('cnt-' + key);
    if (el) el.textContent = ideas.filter(d => d.category === cat).length;
  });
}
function updateStats() {
  document.getElementById('s-total').textContent = ideas.length;
  document.getElementById('s-active').textContent = ideas.filter(d => d.status === '진행중').length;
  document.getElementById('s-done').textContent = ideas.filter(d => d.status === '완료').length;
  document.getElementById('s-likes').textContent = ideas.reduce((a,d) => a + (parseInt(d.likes)||0), 0);
}

function renderTable() {
  const list = getFiltered();
  document.getElementById('result-label').textContent = `${list.length}개`;
  const tb = document.getElementById('tbody');
  if (!list.length) {
    tb.innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-icon">💡</div>아이디어를 추가해보세요</div></td></tr>';
    return;
  }
  tb.innerHTML = list.map(d => {
    const si = STATUS_LIST.indexOf(d.status);
    const bc = BADGE_CLS[si >= 0 ? si : 0];
    const isOpen = !!expanded[d.id];
    const pc = planClass(d.plan);
    const cmtList = comments[d.id] || [];
    const cmtCount = cmtList.length;
    return `
    <tr class="${isOpen ? 'exp' : ''}" id="row-${d.id}">
      <td>
        <div class="td-i" style="${isOpen ? 'padding-bottom:0' : ''}">
          <div class="title-row" onclick="toggleExpand('${d.id}')">
            <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
            <div style="flex:1">
              <div class="title-text">${esc(d.title)}</div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">
                ${d.category ? `<span class="cat-tag ${catCls(d.category)}">${esc(d.category)}</span>` : ''}
                ${cmtCount > 0 ? `<span style="font-size:10px;color:#888">💬 ${cmtCount}</span>` : ''}
              </div>
            </div>
          </div>
        </div>
        <div class="expand-panel ${isOpen ? 'open' : ''}" id="panel-${d.id}">
          <div class="panel-inner">
            <div class="memo-section">
              <div class="section-label">📝 세부 메모</div>
              <textarea placeholder="내용을 입력하세요..." onblur="saveMemo('${d.id}', this.value)">${esc(d.memo||'')}</textarea>
            </div>
            <div class="comment-section">
              <div class="section-label">💬 팀원 의견 <span id="cmt-count-${d.id}" style="color:#ccc">${cmtCount > 0 ? `(${cmtCount})` : ''}</span></div>
              <div class="comment-list" id="cmt-list-${d.id}">
                ${renderCommentHTML(d.id)}
              </div>
              <div class="comment-input-row">
                <input class="comment-author-input" id="cmt-author-${d.id}" placeholder="이름" value="${esc(localStorage.getItem('idea_author')||'')}">
                <input class="comment-text-input" id="cmt-text-${d.id}" placeholder="의견을 남겨주세요..." onkeydown="if(event.key==='Enter')addComment('${d.id}')">
                <button class="comment-submit" onclick="addComment('${d.id}')">등록</button>
              </div>
            </div>
          </div>
        </div>
      </td>
      <td><div class="td-i">
        <div class="author-wrap">
          <div class="av" style="${avStyle(d.author||'익')}">${(d.author||'익').slice(0,2)}</div>
          <span class="author-name">${esc(d.author||'익명')}</span>
        </div>
      </div></td>
      <td><div class="td-i">
        <span class="badge ${bc}" onclick="cycleStatus('${d.id}', ${si})" title="클릭해서 상태 변경">${esc(d.status||'검토중')}</span>
      </div></td>
      <td style="text-align:center"><div class="td-i" style="padding-left:0;padding-right:0;display:flex;justify-content:center">
        <button class="like-btn ${d.myLike ? 'liked' : ''}" onclick="toggleLike('${d.id}')">♥ ${d.likes||0}</button>
      </div></td>
      <td><div class="td-i"><span class="date-txt">${fmtDate(d.date)}</span></div></td>
      <td><div class="td-i">
        <input type="date" class="date-input ${pc}" value="${d.plan||''}" onchange="savePlan('${d.id}', this.value)"
          title="${pc==='overdue'?'기한 초과':pc==='soon'?'곧 마감':'실행 예정일'}">
      </div></td>
      <td><div class="td-i">
        <div class="row-actions">
          <button class="icon-btn" onclick="openEditModal('${d.id}')" title="수정">✏️</button>
          <button class="icon-btn del" onclick="deleteIdea('${d.id}')" title="삭제">🗑</button>
        </div>
      </div></td>
    </tr>`;
  }).join('');
}

function renderCommentHTML(ideaId) {
  const list = comments[ideaId] || [];
  if (!list.length) return `<div class="no-comment">아직 의견이 없어요</div>`;
  return list.map(c => `
    <div class="comment-item">
      <div class="comment-av" style="${avStyle(c.author||'익')}">${(c.author||'익').slice(0,2)}</div>
      <div class="comment-body">
        <div class="comment-author">${esc(c.author||'익명')}</div>
        <div class="comment-text">${esc(c.text)}</div>
        <div class="comment-time">${fmtTime(c.time)}</div>
      </div>
    </div>`).join('');
}

function renderComments(ideaId) {
  const el = document.getElementById(`cmt-list-${ideaId}`);
  const cnt = document.getElementById(`cmt-count-${ideaId}`);
  if (!el) return;
  const list = comments[ideaId] || [];
  el.innerHTML = renderCommentHTML(ideaId);
  if (cnt) cnt.textContent = list.length > 0 ? `(${list.length})` : '';
  // 카드 댓글 수 배지도 업데이트
  const idea = ideas.find(d => d.id === ideaId);
  if (idea) {
    const badge = document.querySelector(`#row-${ideaId} .title-row`);
    if (badge) {
      const cmtBadge = badge.querySelector('span[data-cmt]');
      // 간단히 전체 재렌더 없이 카운트만
    }
  }
}

/* ── 댓글 추가 ── */
async function addComment(ideaId) {
  const authorEl = document.getElementById(`cmt-author-${ideaId}`);
  const textEl   = document.getElementById(`cmt-text-${ideaId}`);
  const author = authorEl.value.trim() || '익명';
  const text   = textEl.value.trim();
  if (!text) return;
  if (author !== '익명') localStorage.setItem('idea_author', author);
  const time = new Date().toISOString();
  const newCmt = { author, text, time };
  if (!comments[ideaId]) comments[ideaId] = [];
  comments[ideaId].push(newCmt);
  textEl.value = '';
  renderComments(ideaId);
  try {
    await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'addComment', ideaId, author, text, time }) });
  } catch(e) {}
}

/* ── 펼침 ── */
function toggleExpand(id) {
  expanded[id] = !expanded[id];
  renderTable();
  if (expanded[id] && !comments[id]) loadComments(id);
}

/* ── API ── */
async function cycleStatus(id, si) {
  const next = STATUS_LIST[(si + 1) % STATUS_LIST.length];
  const idea = ideas.find(d => d.id === id);
  if (!idea) return;
  idea.status = next; renderAll();
  try { await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'update', id, field:'status', value: next }) }); }
  catch(e) { toast('저장 실패'); }
}
async function toggleLike(id) {
  const idea = ideas.find(d => d.id === id);
  if (!idea) return;
  idea.myLike = !idea.myLike;
  idea.likes = (parseInt(idea.likes)||0) + (idea.myLike ? 1 : -1);
  renderAll();
  try { await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'update', id, field:'likes', value: idea.likes }) }); }
  catch(e) {}
}
async function saveMemo(id, val) {
  const idea = ideas.find(d => d.id === id);
  if (!idea || idea.memo === val) return;
  idea.memo = val;
  try { await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'update', id, field:'memo', value: val }) }); toast('메모 저장됨'); }
  catch(e) { toast('저장 실패'); }
}
async function savePlan(id, val) {
  const idea = ideas.find(d => d.id === id);
  if (!idea) return;
  idea.plan = val; renderAll();
  try { await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'update', id, field:'plan', value: val }) }); toast('날짜 저장됨'); }
  catch(e) { toast('저장 실패'); }
}
async function deleteIdea(id) {
  if (!confirm('이 아이디어를 삭제할까요?')) return;
  ideas = ideas.filter(d => d.id !== id);
  delete expanded[id]; delete comments[id];
  renderAll();
  try { await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'delete', id }) }); toast('삭제됐어요'); }
  catch(e) { toast('삭제 실패'); }
}

/* ── 추가 모달 ── */
function openModal() {
  const saved = localStorage.getItem('idea_author');
  if (saved && !document.getElementById('f-author').value) document.getElementById('f-author').value = saved;
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }

async function submitIdea() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('제목을 입력해주세요'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '등록 중...';
  const author = document.getElementById('f-author').value.trim() || '익명';
  if (author !== '익명') localStorage.setItem('idea_author', author);
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const newIdea = {
    title, memo: document.getElementById('f-memo').value.trim(),
    author, category: document.getElementById('f-cat').value,
    status: document.getElementById('f-status').value,
    plan: document.getElementById('f-plan').value,
    date: `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`,
    likes: 0, myLike: false
  };
  try {
    const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'add', ...newIdea }) });
    const result = await res.json();
    newIdea.id = result.id;
    ideas.unshift(newIdea);
    renderAll(); closeModal();
    ['f-title','f-memo','f-plan'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-status').value = '검토중';
    toast('아이디어가 등록됐어요!');
  } catch(e) { toast('등록 실패'); }
  btn.disabled = false; btn.textContent = '등록';
}

/* ── 수정 모달 ── */
function openEditModal(id) {
  const idea = ideas.find(d => d.id === id);
  if (!idea) return;
  editingId = id;
  document.getElementById('e-title').value  = idea.title || '';
  document.getElementById('e-memo').value   = idea.memo || '';
  document.getElementById('e-author').value = idea.author || '';
  document.getElementById('e-cat').value    = idea.category || 'SNS';
  document.getElementById('e-status').value = idea.status || '검토중';
  document.getElementById('e-plan').value   = idea.plan || '';
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEditModal() { document.getElementById('edit-overlay').classList.remove('open'); editingId = null; }

async function saveEdit() {
  if (!editingId) return;
  const title = document.getElementById('e-title').value.trim();
  if (!title) { alert('제목을 입력해주세요'); return; }
  const idea = ideas.find(d => d.id === editingId);
  if (!idea) return;
  const updated = {
    title, memo: document.getElementById('e-memo').value.trim(),
    author: document.getElementById('e-author').value.trim() || '익명',
    category: document.getElementById('e-cat').value,
    status: document.getElementById('e-status').value,
    plan: document.getElementById('e-plan').value,
  };
  Object.assign(idea, updated);
  renderAll(); closeEditModal();
  try {
    await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'updateAll', id: editingId, ...updated }) });
    toast('수정됐어요');
  } catch(e) { toast('저장 실패'); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeEditModal(); }
});

loadIdeas();
</script>
</body>
</html>
